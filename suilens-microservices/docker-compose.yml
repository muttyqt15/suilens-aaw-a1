services:
  catalog-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: catalog_pass
      POSTGRES_DB: catalog_db
    ports:
      - "5433:5432"
    volumes:
      - catalog-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog_user -d catalog_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  order-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_pass
      POSTGRES_DB: order_db
    ports:
      - "5434:5432"
    volumes:
      - order-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_user -d order_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  notification-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notification_user
      POSTGRES_PASSWORD: notification_pass
      POSTGRES_DB: notification_db
    ports:
      - "5435:5432"
    volumes:
      - notification-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification_user -d notification_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  inventory-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_pass
      POSTGRES_DB: inventory_db
    ports:
      - "5436:5432"
    volumes:
      - inventory-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user -d inventory_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  catalog-service:
    build: ./services/catalog-service
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://catalog_user:catalog_pass@catalog-db:5432/catalog_db
    depends_on:
      catalog-db:
        condition: service_healthy

  inventory-service:
    build: ./services/inventory-service
    ports:
      - "3004:3004"
    environment:
      DATABASE_URL: postgres://inventory_user:inventory_pass@inventory-db:5432/inventory_db
      CATALOG_SERVICE_URL: http://catalog-service:3001
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      inventory-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      catalog-service:
        condition: service_started

  order-service:
    build: ./services/order-service
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgres://order_user:order_pass@order-db:5432/order_db
      CATALOG_SERVICE_URL: http://catalog-service:3001
      INVENTORY_SERVICE_URL: http://inventory-service:3004
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      order-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      catalog-service:
        condition: service_started
      inventory-service:
        condition: service_started

  notification-service:
    build: ./services/notification-service
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: postgres://notification_user:notification_pass@notification-db:5432/notification_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      notification-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build: ./frontend/suilens-frontend
    ports:
      - "5173:80"
    depends_on:
      catalog-service:
        condition: service_started
      order-service:
        condition: service_started
      inventory-service:
        condition: service_started

volumes:
  catalog-data:
  order-data:
  notification-data:
  inventory-data:
